name: Build Tauri App

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    name: Build on ${{ matrix.platform }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Node dependencies
        run: npm install

      - name: Run Build prep script
        run: npm run build

      - name: Build Tauri App
        id: tauri-build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: "Schaltplan Editor ${{ github.ref_name }}"
          releaseId: ''
          releaseDraft: true
          prerelease: false
          includeRelease: true
          includeUpdaterJson: false

      - name: Create Inno Setup Installer (Windows only)
        if: matrix.platform == 'windows-latest'
        run: |
          mkdir src-tauri\dist_setup
          iscc src-tauri\innosetup.iss

      - name: Upload Inno Setup Artifact (Windows only)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: InnoSetup-Installer
          path: src-tauri/dist_setup/SchaltplanEditor_Setup.exe

      - name: Upload Inno Setup to GitHub Release (Windows only)
        if: matrix.platform == 'windows-latest' && github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/dist_setup/SchaltplanEditor_Setup.exe
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


